file:
  client-path: /file
  storage-location: /Users/chanchhaya/Pictures/ite-file/
  base-uri: http://localhost:${server.port}${file.client-path}/
spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9999/realms/ite-ecommerce
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${URL}
    username: ${USERNAME}
    password: ${PASSWORD}
  application:
    name: ite-3rd-ecommerce
server:
  port: 9990
keycloak:
  server-url: http://localhost:9999
  realm: master
  target-realm: ite-ecommerce
